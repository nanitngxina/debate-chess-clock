name = "debate-cage-clock"
main = "worker-index.ts"
compatibility_date = "2026-03-18"
compatibility_flags = ["enable_request_signal"]

[assets]
directory = "./dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[kv_namespaces]]
binding = "ROOM_DIRECTORY"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[[migrations]]
tag = "v1"
new_classes = ["RoomDurableObject"]
